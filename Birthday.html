<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Confidential Court File</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0a0a0a, #000);
  color: #eaeaea;
  font-family: "Courier New", monospace;
  text-align: center;
  overflow-x: hidden;
}

.hidden { display: none; }

.container {
  max-width: 750px;
  margin: auto;
  padding: 40px 20px;
}

.glow {
  color: #00ffcc;
  text-shadow: 0 0 8px #00ffcc;
}

button {
  background: transparent;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 12px 18px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00ffcc;
  color: black;
}

#typing {
  white-space: pre-line;
  border-right: 2px solid #00ffcc;
  display: inline-block;
  padding-right: 5px;
}

#verdictBox {
  margin-top: 25px;
  font-size: 18px;
  display: none;
}

#startScreen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* 🌌 Stars */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.6;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 🎈 Magical Balloons */
.balloon {
  position: fixed;
  bottom: -120px;
  border-radius: 50%;
  opacity: 0.9;
  animation: floatUp linear forwards;
}

.balloon::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 25px;
  background: rgba(255,255,255,0.5);
  left: 50%;
  top: 100%;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(0.9); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-120vh) scale(1.1); opacity: 0; }
}

/* ✨ Sparkles */
.sparkle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  animation: sparkleFade 1.5s linear forwards;
}

@keyframes sparkleFade {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.3); }
}
</style>
</head>

<body>

<!-- 🌌 Stars -->
<div class="stars" id="stars"></div>

<!-- START SCREEN -->
<div id="startScreen">
  <h2 class="glow">CONFIDENTIAL FILE</h2>
  <p>Press ENTER to access</p>
</div>

<!-- MAIN -->
<div class="container hidden" id="mainContent">

<h1 class="glow">IN THE COURT OF ANNUAL EVENTS</h1>

<p id="caseTitle"></p>

<br>

<div id="typing"></div>

<br><br>

<button onclick="playSong()">▶ Play Evidence</button>

<br><br>

<h2>Deliver Verdict</h2>

<button onclick="giveVerdict('Not Guilty')">Not Guilty</button>
<button onclick="giveVerdict('Guilty')">Guilty</button>
<button onclick="giveVerdict('Adjourned')">Adjourned</button>

<div id="verdictBox"></div>

</div>

<!-- AUDIO -->
<audio id="song">
  <source src="https://www.soundjay.com/human/sounds/happy-birthday-song-01.mp3" type="audio/mpeg">
</audio>

<audio id="gavel">
  <source src="https://www.soundjay.com/misc/sounds/gavel-01.mp3">
</audio>

<script>

// 👉 START
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");
    createStars();
    typeEffect();
  }
});

// 👉 NAME
const name = "Mr. Arindam Mishra";

document.getElementById("caseTitle").innerHTML =
`Case No. 2026-BDAY-001<br>
The People vs. ${name}<br>
Charge: Turning one year older`;

// 👉 TYPING TEXT
const text = `Upon reviewing the records of the past year,
the court acknowledges that the accused has:

• Become more experienced, wiser, and arguably more handsome  
• Continued to win arguments with remarkable confidence  
• Maintained a strong reputation for logic and precision`;

let i = 0;
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 25);
  }
}

// 🌌 STARS
function createStars() {
  const container = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (2 + Math.random() * 3) + "s";
    container.appendChild(star);
  }
}

// 🎈 BALLOONS
function createBalloons() {
  const colors = ["#ff4d6d","#ffcc00","#00ffcc","#66a3ff","#ff66ff","#ffffff"];

  for (let i = 0; i < 25; i++) {
    setTimeout(() => {

      let balloon = document.createElement("div");
      balloon.className = "balloon";

      let size = 30 + Math.random() * 40;
      balloon.style.width = size + "px";
      balloon.style.height = size + "px";

      balloon.style.left = Math.random() * 100 + "vw";
      balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
      balloon.style.boxShadow = `0 0 15px ${balloon.style.background}`;
      balloon.style.animationDuration = (5 + Math.random() * 4) + "s";

      document.body.appendChild(balloon);

      let sparkleInterval = setInterval(() => {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = balloon.offsetLeft + (size/2) + "px";
        sparkle.style.top = balloon.offsetTop + "px";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1500);
      }, 300);

      setTimeout(() => {
        clearInterval(sparkleInterval);
        balloon.remove();
      }, 9000);

    }, i * 200);
  }
}

// 🎵 SONG + FADE
function playSong(){
  const song = document.getElementById("song");

  song.volume = 0;
  song.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      song.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  createBalloons();
}

// ⚖️ VERDICT
function giveVerdict(v){
  document.getElementById("gavel").play();

  let msg = "";

  if(v === "Not Guilty"){
    msg = "Verdict: Not Guilty<br><br>Court Order:<br>Proceed to enjoy birthday celebrations immediately.";
  }
  else if(v === "Guilty"){
    msg = "Verdict: Guilty of aging<br><br>Sentence:<br>Cake. No appeal allowed.";
  }
  else{
    msg = "Verdict: Adjourned<br><br>Reason:<br>Judge requires coffee before further proceedings.";
  }

  const box = document.getElementById("verdictBox");
  box.style.display = "block";
  box.innerHTML = msg + `<br><br>Court is adjourned.<br>Have a good birthday.<br><br>– Abhilasha`;
}

// 👀 SECRET MESSAGE
document.getElementById("song").addEventListener("ended", function(){
  setTimeout(() => {
    const msg = document.createElement("div");
    msg.innerHTML = `
    <div style="
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.9);
      padding:20px 30px;
      border:1px solid #00ffcc;
      color:#00ffcc;
    ">
      Additional Note:<br><br>
      Still one of the most interesting people I know.<br><br>
      – A
    </div>`;
    document.body.appendChild(msg);
  }, 2000);
});

</script>

</body>
</html>
